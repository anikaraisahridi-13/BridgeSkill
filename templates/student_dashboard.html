<!DOCTYPE html>
<html>

<head>

<title>Student Dashboard</title>

<link rel="stylesheet" href="/static/style.css">
<script src="/static/script.js" defer></script>

</head>

<body>

<div class="dashboard">

<h1>Find Your Mentor</h1>

<!-- Static Cards (Design part) -->

<div class="card">

<img src="https://images.unsplash.com/photo-1535713875002-d1d0cf377fde"
width="80" style="border-radius:50%">

<h3>AI Engineer</h3>

<p>10 years experience in Machine Learning</p>

<a class="btn-primary" href="#">Explore</a>

</div>


<div class="card">

<img src="https://images.unsplash.com/photo-1544725176-7c40e5a2c9f9"
width="80" style="border-radius:50%">

<h3>Product Manager</h3>

<p>Worked at global startups</p>

<a class="btn-primary" href="#">Explore</a>

</div>


<!-- Dynamic Mentors from Database -->

{% for mentor in mentors %}

<div class="card">

<img src="{{ mentor.image }}" width="80" style="border-radius:50%">

<h3>{{ mentor.name }}</h3>

<p>{{ mentor.experience }}</p>

<a class="btn-primary" href="/request/{{ mentor.id }}">
Request Mentorship
</a>

</div>

{% endfor %}

</div>

</body>

</html>
